<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Budgets</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <h1>Expense Tracker</h1>
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="expenses.html">Expenses</a></li>
            <li><a href="income.html">Income</a></li>
            <li><a href="budgets.html">Budgets</a></li>
            <li><a href="savings.html">Savings</a></li>
            <li><a href="categories.html">Categories</a></li>
            <li><a href="ai.html">AI Insights</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Budgets</h2>
            <div class="table-container">
                <table id="budgets-table">
                    <thead>
                        <tr>
                            <th>Category</th>
                            <th>Limit Amount</th>
                            <th>Month</th>
                            <th>Year</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>

        <form id="add-budget-form">
            <h2>Add Budget</h2>
            <div class="form-group">
                <label for="limitAmount">Limit Amount</label>
                <input type="number" id="limitAmount" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" required>
                    <!-- Options will be loaded -->
                </select>
            </div>
            <button type="submit">Add Budget</button>
        </form>
    </div>

    <script>
        async function loadBudgets() {
            try {
                const response = await fetch('/budgets');
                const tbody = document.querySelector('#budgets-table tbody');
                tbody.innerHTML = '';
                if (response.ok) {
                    const budgets = await response.json();
                    budgets.forEach(budget => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${budget.category ? budget.category.name : 'N/A'}</td>
                            <td>₹${parseFloat(budget.limitAmount).toFixed(2)}</td>
                            <td>${budget.month}</td>
                            <td>${budget.year}</td>
                            <td>
                                <button onclick="updateBudget(${budget.id}, ${budget.limitAmount}, ${budget.category.id})">Update</button>
                                <button class="delete-btn" onclick="deleteBudget(${budget.id})">Delete</button>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                } else if (response.status === 404) {
                    tbody.innerHTML = '<tr><td colspan="5">No data found</td></tr>';
                } else {
                    throw new Error('Failed to load budgets');
                }
            } catch (error) {
                console.error('Error loading budgets:', error);
                showMessage('Failed to load budgets.', 'error');
            }
        }

        async function loadCategories() {
            try {
                const response = await fetch('/categories');
                const select = document.getElementById('category');
                select.innerHTML = '';
                if (response.ok) {
                    const categories = await response.json();
                    categories.forEach(category => {
                        const option = document.createElement('option');
                        option.value = category.id;
                        option.textContent = category.name;
                        select.appendChild(option);
                    });
                } else if (response.status === 404) {
                    // No categories
                } else {
                    throw new Error('Failed to load categories');
                }
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        async function addBudget(event) {
            event.preventDefault();
            const limitAmount = document.getElementById('limitAmount').value;
            const categoryId = document.getElementById('category').value;

            const now = new Date();
            const month = now.getMonth() + 1;
            const year = now.getFullYear();

            const budget = {
                limitAmount: parseFloat(limitAmount),
                month: month,
                year: year,
                user: { id: 1 },
                category: { id: parseInt(categoryId) }
            };

            try {
                const response = await fetch('/budgets', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(budget)
                });
                if (response.ok) {
                    showMessage('Budget added successfully.', 'success');
                    document.getElementById('add-budget-form').reset();
                    loadBudgets();
                } else {
                    throw new Error('Failed to add budget');
                }
            } catch (error) {
                console.error('Error adding budget:', error);
                showMessage('Failed to add budget.', 'error');
            }
        }

        async function deleteBudget(id) {
            try {
                const response = await fetch(`/budgets/${id}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    showMessage('Budget deleted successfully.', 'success');
                    loadBudgets();
                } else {
                    throw new Error('Failed to delete budget');
                }
            } catch (error) {
                console.error('Error deleting budget:', error);
                showMessage('Failed to delete budget.', 'error');
            }
        }

        async function updateBudget(id, currentLimit, categoryId) {
            const newLimit = prompt("Enter new limit amount:", currentLimit);
            if (newLimit !== null && newLimit !== "") {
                const now = new Date();
                const month = now.getMonth() + 1;
                const year = now.getFullYear();
                const budget = {
                    id: id,
                    limitAmount: parseFloat(newLimit),
                    month: month,
                    year: year,
                    user: { id: 1 },
                    category: { id: categoryId }
                };
                try {
                    const response = await fetch(`/budgets/${id}`, {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(budget)
                    });
                    if (response.ok) {
                        showMessage('Budget updated successfully.', 'success');
                        loadBudgets();
                    } else {
                        throw new Error('Failed to update budget');
                    }
                } catch (error) {
                    showMessage('Failed to update budget.', 'error');
                }
            }
        }

        function showMessage(text, type) {
            const container = document.querySelector('.container');
            const message = document.createElement('div');
            message.className = `message ${type}`;
            message.textContent = text;
            container.insertBefore(message, container.firstChild);
            setTimeout(() => message.remove(), 5000);
        }

        window.onload = () => {
            loadBudgets();
            loadCategories();
            document.getElementById('add-budget-form').addEventListener('submit', addBudget);
        };
    </script>
</body>
</html>
