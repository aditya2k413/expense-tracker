<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Expenses</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <h1>Expense Tracker</h1>
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="expenses.html">Expenses</a></li>
            <li><a href="income.html">Income</a></li>
            <li><a href="budgets.html">Budgets</a></li>
            <li><a href="savings.html">Savings</a></li>
            <li><a href="categories.html">Categories</a></li>
            <li><a href="ai.html">AI Insights</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="filter-section">
            <label for="month-select">Month:</label>
            <select id="month-select">
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
            <label for="year-select">Year:</label>
            <select id="year-select">
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026">2026</option>
                <option value="2027">2027</option>
            </select>
            <label for="category-filter">Category:</label>
            <select id="category-filter">
                <option value="">All Categories</option>
                <!-- Options will be loaded -->
            </select>
            <button onclick="loadExpenses()">Apply</button>
        </div>

        <div class="card">
            <h2>Expenses</h2>
            <div class="table-container">
                <table id="expenses-table">
                    <thead>
                        <tr>
                            <th>Amount</th>
                            <th>Description</th>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>

        <form id="add-expense-form">
            <h2>Add Expense</h2>
            <input type="hidden" id="expense-id">
            <div class="form-group">
                <label for="amount">Amount</label>
                <input type="number" id="amount" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <input type="text" id="description" required>
            </div>
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" required>
                    <!-- Options will be loaded -->
                </select>
            </div>
            <button type="submit" id="submit-btn">Add Expense</button>
            <button type="button" id="cancel-btn" onclick="resetForm()" style="display:none;">Cancel</button>
        </form>
    </div>

    <script>
        let isEditing = false;
        let allExpenses = [];

        async function loadExpenses() {
            try {
                const month = document.getElementById('month-select').value;
                const year = document.getElementById('year-select').value;
                const response = await fetch(`/expenses/by-month?month=${month}&year=${year}`);
                if (response.ok) {
                    allExpenses = await response.json();
                    document.getElementById('category-filter').value = '';
                    filterAndRender();
                } else if (response.status === 404) {
                    allExpenses = [];
                    filterAndRender();
                } else {
                    throw new Error('Failed to load expenses');
                }
            } catch (error) {
                console.error('Error loading expenses:', error);
                showMessage('Failed to load expenses.', 'error');
            }
        }

        async function loadCategories() {
            try {
                const response = await fetch('/categories');
                const select = document.getElementById('category');
                const filterSelect = document.getElementById('category-filter');
                select.innerHTML = '';
                filterSelect.innerHTML = '<option value="">All Categories</option>';
                if (response.ok) {
                    const categories = await response.json();
                    categories.filter(category => category.type === 'EXPENSE').forEach(category => {
                        const option = document.createElement('option');
                        option.value = category.id;
                        option.textContent = category.name;
                        select.appendChild(option);

                        const filterOption = document.createElement('option');
                        filterOption.value = category.id;
                        filterOption.textContent = category.name;
                        filterSelect.appendChild(filterOption);
                    });
                } else if (response.status === 404) {
                    // No categories
                } else {
                    throw new Error('Failed to load categories');
                }
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        async function addExpense(event) {
            event.preventDefault();
            const id = document.getElementById('expense-id').value;
            const amount = document.getElementById('amount').value;
            const description = document.getElementById('description').value;
            const date = document.getElementById('date').value;
            const categoryId = document.getElementById('category').value;

            const expense = {
                id: id ? parseInt(id) : undefined,
                amount: parseFloat(amount),
                description,
                date,
                user: { id: 1 },
                category: { id: parseInt(categoryId) }
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/expenses/${id}` : '/expenses';
            const successMessage = id ? 'Expense updated successfully.' : 'Expense added successfully.';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(expense)
                });
                if (response.ok) {
                    showMessage(successMessage, 'success');
                    resetForm();
                    loadExpenses();
                } else {
                    throw new Error(`Failed to ${id ? 'update' : 'add'} expense`);
                }
            } catch (error) {
                console.error(`Error ${id ? 'updating' : 'adding'} expense:`, error);
                showMessage(`Failed to ${id ? 'update' : 'add'} expense.`, 'error');
            }
        }

        async function deleteExpense(id) {
            try {
                const response = await fetch(`/expenses/${id}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    showMessage('Expense deleted successfully.', 'success');
                    loadExpenses();
                } else {
                    throw new Error('Failed to delete expense');
                }
            } catch (error) {
                console.error('Error deleting expense:', error);
                showMessage('Failed to delete expense.', 'error');
            }
        }

        function showMessage(text, type) {
            const container = document.querySelector('.container');
            const message = document.createElement('div');
            message.className = `message ${type}`;
            message.textContent = text;
            container.insertBefore(message, container.firstChild);
            setTimeout(() => message.remove(), 5000);
        }

        function resetForm() {
            document.getElementById('add-expense-form').reset();
            document.getElementById('submit-btn').textContent = 'Add Expense';
            document.getElementById('cancel-btn').style.display = 'none';
            document.getElementById('expense-id').value = '';
        }

        function editExpense(id, amount, description, date, categoryId) {
            document.getElementById('expense-id').value = id;
            document.getElementById('amount').value = amount;
            document.getElementById('description').value = description;
            document.getElementById('date').value = date;
            document.getElementById('category').value = categoryId;
            document.getElementById('submit-btn').textContent = 'Update Expense';
            document.getElementById('cancel-btn').style.display = 'inline';
            document.getElementById('add-expense-form').scrollIntoView({ behavior: 'smooth' });
        }

        function filterAndRender() {
            const categoryId = document.getElementById('category-filter').value;
            const filteredExpenses = categoryId ? allExpenses.filter(expense => expense.category && expense.category.id == categoryId) : allExpenses;
            const tbody = document.querySelector('#expenses-table tbody');
            tbody.innerHTML = '';
            filteredExpenses.forEach(expense => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>₹${parseFloat(expense.amount).toFixed(2)}</td>
                    <td>${expense.description}</td>
                    <td>${expense.date}</td>
                    <td>${expense.category ? expense.category.name : 'N/A'}</td>
                    <td>
                        <button onclick="editExpense(${expense.id}, '${expense.amount}', '${expense.description}', '${expense.date}', ${expense.category ? expense.category.id : 0})">Edit</button>
                        <button class="delete-btn" onclick="deleteExpense(${expense.id})">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
            if (filteredExpenses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">No data found</td></tr>';
            }
        }

        window.onload = () => {
            const now = new Date();
            document.getElementById('month-select').value = now.getMonth() + 1;
            document.getElementById('year-select').value = now.getFullYear();
            loadExpenses();
            loadCategories();
            document.getElementById('add-expense-form').addEventListener('submit', addExpense);
            document.getElementById('category-filter').addEventListener('change', filterAndRender);
        };
    </script>
</body>
</html>
